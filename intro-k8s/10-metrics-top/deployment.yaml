apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stress
  template:
    metadata:
      labels:
        app: stress
    spec:
      containers:
      - name: stress
        image: busybox
        command: ["sh", "-c", "while true; do echo x >> /tmp/data; sleep 0.1; done"]
