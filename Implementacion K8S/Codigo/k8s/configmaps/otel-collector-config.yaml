apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: pharmago
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
      otlp/jaeger:
        endpoint: "pharmago-jaeger:4317"
        tls:
          insecure: true
      debug: {}

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [prometheus, debug]
        traces:
          receivers: [otlp]
          exporters: [otlp/jaeger, debug]

