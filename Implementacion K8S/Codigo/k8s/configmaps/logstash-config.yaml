apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: pharmago
data:
  logstash.conf: |
    input {
      # NOTA: En K8s, Logstash no puede leer directamente de /var/lib/docker/containers
      # Esta configuración es un placeholder. Para producción, considerar:
      # - Usar Filebeat/Fluentd como DaemonSet para recolectar logs
      # - Usar un sidecar pattern
      # - Usar la API de Kubernetes para leer logs de pods
      http {
        port => 5044
        codec => json
      }
    }

    filter {
      # Agregar metadata del servicio
      if [service] {
        mutate {
          add_field => { "service" => "%{service}" }
        }
      }
      
      # Parsear timestamp
      if [time] {
        date {
          match => [ "time", "ISO8601" ]
          target => "@timestamp"
        }
      }
    }

    output {
      elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "pharmago-logs-%{+YYYY.MM.dd}"
      }
    }
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false
    log.level: error

