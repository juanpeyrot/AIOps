apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: pharmago
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 5s
          queryTimeout: 60s
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'PharmaGo'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards

