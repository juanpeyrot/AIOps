input {
  # Leer logs de Docker desde los archivos JSON
  file {
    path => "/var/lib/docker/containers/*/*-json.log"
    start_position => "end"
    codec => "json"
    sincedb_path => "/usr/share/logstash/data/sincedb"
    ignore_older => 86400
  }
}

filter {
  # El codec json ya parseó el JSON de Docker, ahora tenemos campos como "log", "stream", "time"
  
  # El campo "log" contiene el mensaje real del log (puede ser texto plano o JSON)
  # No intentamos parsearlo como JSON automáticamente para evitar errores
  
  # Extraer nombre del contenedor del path
  if [path] {
    grok {
      match => { "path" => "/var/lib/docker/containers/%{DATA:container_id}/%{GREEDYDATA:log_file}" }
    }
  }
  
  # Agregar metadata del contenedor
  if [container_id] {
    mutate {
      add_field => { "container_id" => "%{container_id}" }
    }
  }
  
  # Parsear timestamp
  if [time] {
    date {
      match => [ "time", "ISO8601" ]
      target => "@timestamp"
    }
  }
  
  # Agregar tag de servicio basado en el nombre del contenedor
  if [path] =~ /api-gateway/ {
    mutate {
      add_field => { "service" => "pharmago-api-gateway" }
    }
  } else if [path] =~ /users-service/ {
    mutate {
      add_field => { "service" => "pharmago-users-service" }
    }
  } else if [path] =~ /pharmacy-service/ {
    mutate {
      add_field => { "service" => "pharmago-pharmacy-service" }
    }
  }
  
  # Renombrar el campo "log" a "message" para consistencia
  if [log] {
    mutate {
      rename => { "log" => "message" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "pharmago-logs-%{+YYYY.MM.dd}"
  }
}
